<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}JOJ News{% endblock %}</title>
    <script
      src="https://kit.fontawesome.com/a2499938ec.js"
      crossorigin="anonymous"
    ></script>

  <!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% load static %}
</head>

<body class="bg-light">

<!--  HEADER -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/"> <img src="{% static 'images/logo1.png' %}" 
             alt="JOJ News"
             class="img-fluid rounded-4 shadow-lg"
             style="max-height: 50px; object-fit: cover;"> <span class="fs-6 fw-light"> Jeux Olympique de la Jeunesse</span></a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="/">Accueil</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/articles/">Articles</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/categories/">Catégories</a>
        </li>
       
      </ul>
    </div>
  </div>
</nav>

<!--  CONTENU -->
<div class="container mt-4">
  {% block content %}
  {% endblock %}
</div>

<!-- 🔻 FOOTER -->
<footer class="bg-dark text-light mt-5 py-4">
  <div class="container text-center">

    <p class="mb-1"> 2026 JOJ News - Tous droits réservés </p>

    <small>
      Plateforme d’actualités développée avec Django
    </small>

  </div>
</footer>

</body>
</html>
